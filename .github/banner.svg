<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AEOrank — AI-visibility inspector for modern sites">
  <!-- Paper / cream background -->
  <rect width="1280" height="320" fill="#FAF9F2"/>

  <!-- Subtle tick rule running left edge (Inspector rail motif) -->
  <g stroke="#111" stroke-width="1" opacity="0.12">
    <line x1="64" y1="32" x2="64" y2="288"/>
    <line x1="58" y1="32" x2="70" y2="32"/>
    <line x1="58" y1="96" x2="70" y2="96"/>
    <line x1="58" y1="160" x2="70" y2="160"/>
    <line x1="58" y1="224" x2="70" y2="224"/>
    <line x1="58" y1="288" x2="70" y2="288"/>
  </g>
  <text x="78" y="36" fill="#111" fill-opacity="0.35" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="10" letter-spacing="0.1em">START</text>
  <text x="78" y="292" fill="#111" fill-opacity="0.35" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="10" letter-spacing="0.1em">END</text>

  <!-- Crop marks: TL + BR (inspector frame) -->
  <g stroke="#111" stroke-width="1.5">
    <line x1="32" y1="16" x2="48" y2="16"/>
    <line x1="32" y1="16" x2="32" y2="32"/>
    <line x1="1248" y1="304" x2="1232" y2="304"/>
    <line x1="1248" y1="304" x2="1248" y2="288"/>
  </g>

  <!-- Session header tag -->
  <text x="128" y="72" fill="#111" fill-opacity="0.55" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="12" letter-spacing="0.12em">// INSPECTOR SESSION · 2026-04-20</text>

  <!-- Wordmark: brand A-block + "AEOrank" + version chip -->
  <rect x="128" y="96" width="48" height="48" rx="4" fill="#111"/>
  <path d="M142 132 L151 104 L160 132" stroke="#FAF9F2" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M145 124 H157" stroke="#FAF9F2" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="168" cy="128" r="5" stroke="#FAF9F2" stroke-width="2.4" fill="none"/>
  <path d="M168 128 L174 134" stroke="#E8590C" stroke-width="2.6" stroke-linecap="round"/>

  <text x="192" y="136" fill="#111" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="44" font-weight="620" letter-spacing="-0.022em">AEOrank</text>

  <!-- Version/status chip -->
  <rect x="388" y="110" width="68" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.35" stroke-width="1"/>
  <text x="398" y="125" fill="#111" fill-opacity="0.7" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.06em">v1.0 · MIT</text>

  <!-- Tagline -->
  <text x="128" y="176" fill="#111" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="19" font-weight="440" letter-spacing="-0.012em">AI-visibility scoring · 36 criteria · 9 generated files · 13 frameworks.</text>

  <!-- Receipt-style command card -->
  <g>
    <rect x="128" y="204" width="560" height="52" rx="4" fill="#fff" stroke="#111" stroke-width="1"/>
    <!-- dashed rule inside -->
    <line x1="140" y1="234" x2="676" y2="234" stroke="#111" stroke-opacity="0.25" stroke-dasharray="2 3"/>
    <text x="148" y="228" fill="#111" fill-opacity="0.45" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.1em">// ONE COMMAND · ZERO CONFIG</text>
    <text x="148" y="250" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="15" fill="#111">
      <tspan fill="#111" fill-opacity="0.45">$&#160;</tspan>
      <tspan fill="#E8590C" font-weight="580">npx aeorank-cli scan</tspan>
      <tspan fill="#111">&#160;https://your-site.com</tspan>
    </text>
  </g>

  <!-- Pillar pills (right side) -->
  <g font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.02em">
    <!-- PASS -->
    <rect x="720" y="204" width="84" height="22" rx="3" fill="#fff" stroke="#111" stroke-width="1"/>
    <circle cx="732" cy="215" r="3" fill="#2E7D32"/>
    <text x="742" y="219" fill="#111">16 pass</text>
    <!-- WARN -->
    <rect x="812" y="204" width="84" height="22" rx="3" fill="#fff" stroke="#111" stroke-width="1"/>
    <circle cx="824" cy="215" r="3" fill="#C58A00"/>
    <text x="834" y="219" fill="#111">11 warn</text>
    <!-- FAIL -->
    <rect x="904" y="204" width="84" height="22" rx="3" fill="#fff" stroke="#111" stroke-width="1"/>
    <circle cx="916" cy="215" r="3" fill="#B32A1E"/>
    <text x="926" y="219" fill="#111">9 fail</text>
  </g>

  <!-- Score block (right) -->
  <g>
    <rect x="1016" y="96" width="192" height="160" rx="4" fill="#fff" stroke="#111" stroke-width="1"/>
    <!-- header bar -->
    <text x="1028" y="116" fill="#111" fill-opacity="0.55" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="10" letter-spacing="0.12em">AEO SCORE</text>
    <text x="1196" y="116" text-anchor="end" fill="#111" fill-opacity="0.4" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="10" letter-spacing="0.1em">#0000047</text>
    <line x1="1028" y1="124" x2="1196" y2="124" stroke="#111" stroke-opacity="0.25" stroke-dasharray="2 3"/>
    <!-- big number -->
    <text x="1028" y="190" fill="#111" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="64" font-weight="620" letter-spacing="-0.04em">92</text>
    <text x="1124" y="190" fill="#111" fill-opacity="0.45" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="13">/100</text>
    <!-- grade -->
    <text x="1196" y="194" text-anchor="end" fill="#E8590C" font-family="'ui-serif', 'Playfair Display', Georgia, serif" font-size="52" font-style="italic" font-weight="600">A</text>
    <!-- footer -->
    <line x1="1028" y1="216" x2="1196" y2="216" stroke="#111" stroke-opacity="0.25" stroke-dasharray="2 3"/>
    <text x="1028" y="236" fill="#111" fill-opacity="0.55" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="10" letter-spacing="0.08em">aeorank.dev · scored by itself</text>
  </g>
</svg>
