name: Daily Demo Scan
on:
  schedule:
    - cron: '30 14 * * *' # 9:30am EST daily
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan'
        required: false
        default: 'https://sumhealth.org'

permissions:
  contents: write

jobs:
  demo-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aeorank CLI
        run: npm install -g aeorank-cli

      - name: Run demo scan
        run: |
          TARGET="${{ github.event.inputs.target_url || 'https://sumhealth.org' }}"
          echo "Scanning: $TARGET"
          aeorank-cli scan "$TARGET" --format json --no-files > /tmp/scan-result.json

      - name: Generate DEMO.md
        run: |
          TARGET="${{ github.event.inputs.target_url || 'https://sumhealth.org' }}"
          DATE=$(date +'%B %d, %Y')

          # Parse JSON and build markdown
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('/tmp/scan-result.json', 'utf8'));
          const score = data.score ?? data.overall ?? 'N/A';
          const grade = data.grade ?? '';
          const dims = data.dimensions || [];

          let md = '# aeorank Live Demo\n\n';
          md += '> Auto-generated daily scan. See your own score at [aeorank.dev](https://aeorank.dev)\n\n';
          md += '**Scanned:** ${TARGET}  \n';
          md += '**Date:** ${DATE}  \n';
          md += '**Score:** ' + score + '/100 (' + grade + ')\n\n';
          md += '## Dimension Scores\n\n';
          md += '| Dimension | Score | Pass |\n';
          md += '|-----------|-------|------|\n';
          for (const d of dims) {
            const pass = (d.score >= 50) ? '✅' : '❌';
            md += '| ' + d.name + ' | ' + d.score + ' | ' + pass + ' |\n';
          }
          md += '\n---\n\n';
          md += '*Generated by [aeorank-cli](https://www.npmjs.com/package/aeorank-cli) via GitHub Actions*\n';
          fs.writeFileSync('DEMO.md', md);
          "

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-${{ github.run_number }}
          path: /tmp/scan-result.json
          retention-days: 30

      - name: Commit results
        run: |
          git config --global user.name 'aeorank-bot'
          git config --global user.email 'bot@aeorank.dev'
          cp /tmp/scan-result.json .github/latest-scan.json
          git add DEMO.md .github/latest-scan.json
          git diff --staged --quiet || git commit -m "demo: daily scan update $(date +'%Y-%m-%d') [skip ci]"
          git push
