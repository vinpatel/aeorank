<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AEOrank — open-source AI-visibility scanner">
  <!-- Paper / cream background -->
  <rect width="1280" height="640" fill="#FAF9F2"/>

  <!-- Inspector rail (left edge tick marks) -->
  <g stroke="#111" stroke-width="1" opacity="0.12">
    <line x1="64" y1="56" x2="64" y2="584"/>
    <line x1="58" y1="56" x2="70" y2="56"/>
    <line x1="58" y1="188" x2="70" y2="188"/>
    <line x1="58" y1="320" x2="70" y2="320"/>
    <line x1="58" y1="452" x2="70" y2="452"/>
    <line x1="58" y1="584" x2="70" y2="584"/>
  </g>
  <text x="78" y="60" fill="#111" fill-opacity="0.35" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.12em">START</text>
  <text x="78" y="588" fill="#111" fill-opacity="0.35" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.12em">END</text>

  <!-- Crop marks: 4 corners -->
  <g stroke="#111" stroke-width="1.5">
    <line x1="32" y1="32" x2="52" y2="32"/>
    <line x1="32" y1="32" x2="32" y2="52"/>
    <line x1="1248" y1="32" x2="1228" y2="32"/>
    <line x1="1248" y1="32" x2="1248" y2="52"/>
    <line x1="32" y1="608" x2="52" y2="608"/>
    <line x1="32" y1="608" x2="32" y2="588"/>
    <line x1="1248" y1="608" x2="1228" y2="608"/>
    <line x1="1248" y1="608" x2="1248" y2="588"/>
  </g>

  <!-- Session header -->
  <text x="128" y="100" fill="#111" fill-opacity="0.55" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="13" letter-spacing="0.14em">// AEORANK · INSPECTOR · v1.0</text>

  <!-- Wordmark: A-block + "AEOrank" -->
  <rect x="128" y="128" width="64" height="64" rx="6" fill="#111"/>
  <path d="M146 184 L158 144 L170 184" stroke="#FAF9F2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M150 174 H166" stroke="#FAF9F2" stroke-width="3" stroke-linecap="round"/>
  <circle cx="180" cy="180" r="6" stroke="#FAF9F2" stroke-width="3" fill="none"/>
  <path d="M180 180 L188 188" stroke="#E8590C" stroke-width="3.2" stroke-linecap="round"/>

  <text x="208" y="180" fill="#111" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="60" font-weight="640" letter-spacing="-0.024em">AEOrank</text>

  <!-- Tagline -->
  <text x="128" y="252" fill="#111" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="28" font-weight="500" letter-spacing="-0.014em">Score your site's <tspan font-weight="640">AI visibility.</tspan></text>
  <text x="128" y="288" fill="#111" fill-opacity="0.7" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="22" font-weight="420" letter-spacing="-0.008em">36 checks · 9 generated files · 13 framework plugins · MIT.</text>

  <!-- Receipt-style command card -->
  <g>
    <rect x="128" y="332" width="640" height="68" rx="5" fill="#fff" stroke="#111" stroke-width="1.2"/>
    <line x1="142" y1="368" x2="754" y2="368" stroke="#111" stroke-opacity="0.22" stroke-dasharray="2 3"/>
    <text x="148" y="360" fill="#111" fill-opacity="0.45" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="12" letter-spacing="0.12em">// ONE COMMAND · ZERO CONFIG</text>
    <text x="148" y="390" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="20" fill="#111">
      <tspan fill="#111" fill-opacity="0.45">$&#160;</tspan>
      <tspan fill="#E8590C" font-weight="600">npx aeorank-cli scan</tspan>
      <tspan fill="#111">&#160;https://your-site.com</tspan>
    </text>
  </g>

  <!-- Pillar pills -->
  <g font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="13" letter-spacing="0.02em">
    <rect x="128" y="424" width="100" height="28" rx="4" fill="#fff" stroke="#111" stroke-width="1"/>
    <circle cx="142" cy="438" r="4" fill="#2E7D32"/>
    <text x="154" y="443" fill="#111">16 pass</text>
    <rect x="236" y="424" width="100" height="28" rx="4" fill="#fff" stroke="#111" stroke-width="1"/>
    <circle cx="250" cy="438" r="4" fill="#C58A00"/>
    <text x="262" y="443" fill="#111">11 warn</text>
    <rect x="344" y="424" width="92" height="28" rx="4" fill="#fff" stroke="#111" stroke-width="1"/>
    <circle cx="358" cy="438" r="4" fill="#B32A1E"/>
    <text x="370" y="443" fill="#111">9 fail</text>
  </g>

  <!-- Framework chips row -->
  <g font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.04em">
    <text x="128" y="498" fill="#111" fill-opacity="0.5" font-size="11" letter-spacing="0.12em">// PLUGINS</text>
    <g fill="#111" fill-opacity="0.85">
      <rect x="128" y="510" width="72" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="164" y="525" text-anchor="middle">next</text>
      <rect x="208" y="510" width="72" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="244" y="525" text-anchor="middle">astro</text>
      <rect x="288" y="510" width="72" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="324" y="525" text-anchor="middle">nuxt</text>
      <rect x="368" y="510" width="72" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="404" y="525" text-anchor="middle">remix</text>
      <rect x="448" y="510" width="78" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="487" y="525" text-anchor="middle">svelte</text>
      <rect x="534" y="510" width="78" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="573" y="525" text-anchor="middle">gatsby</text>
      <rect x="620" y="510" width="84" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="662" y="525" text-anchor="middle">shopify</text>
      <rect x="712" y="510" width="60" height="22" rx="3" fill="none" stroke="#111" stroke-opacity="0.4"/>
      <text x="742" y="525" text-anchor="middle">11ty</text>
    </g>
  </g>

  <!-- Bottom URL strip -->
  <g>
    <line x1="128" y1="568" x2="1152" y2="568" stroke="#111" stroke-opacity="0.22" stroke-dasharray="2 3"/>
    <text x="128" y="592" fill="#111" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="13" letter-spacing="0.06em">github.com/vinpatel/aeorank</text>
    <text x="1152" y="592" text-anchor="end" fill="#111" fill-opacity="0.6" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="13" letter-spacing="0.06em">aeorank.dev</text>
  </g>

  <!-- Score card (right side) -->
  <g>
    <rect x="848" y="128" width="304" height="216" rx="6" fill="#fff" stroke="#111" stroke-width="1.2"/>
    <text x="864" y="156" fill="#111" fill-opacity="0.55" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.14em">AEO SCORE</text>
    <text x="1136" y="156" text-anchor="end" fill="#111" fill-opacity="0.4" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.1em">#0000047</text>
    <line x1="864" y1="168" x2="1136" y2="168" stroke="#111" stroke-opacity="0.25" stroke-dasharray="2 3"/>

    <text x="864" y="266" fill="#111" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="104" font-weight="640" letter-spacing="-0.045em">92</text>
    <text x="1018" y="266" fill="#111" fill-opacity="0.45" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="16">/100</text>
    <text x="1136" y="272" text-anchor="end" fill="#E8590C" font-family="'ui-serif', 'Playfair Display', Georgia, serif" font-size="80" font-style="italic" font-weight="640">A</text>

    <line x1="864" y1="290" x2="1136" y2="290" stroke="#111" stroke-opacity="0.25" stroke-dasharray="2 3"/>
    <text x="864" y="312" fill="#111" fill-opacity="0.7" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.08em">aeorank.dev · scored by itself</text>
    <text x="864" y="330" fill="#111" fill-opacity="0.55" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="11" letter-spacing="0.08em">36 checks · 9 files · 0.93s</text>
  </g>
</svg>
