<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#09090B"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E8590C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#E8590C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="640" cy="280" rx="600" ry="350" fill="url(#glow)"/>

  <!-- Logo -->
  <rect x="580" y="60" width="80" height="80" rx="16" fill="#E8590C"/>
  <path d="M600 108L613 78H627L640 108" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M604 97H636" stroke="#fff" stroke-width="5" stroke-linecap="round"/>

  <!-- Title -->
  <text x="640" y="185" fill="#FAF9F7" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" text-anchor="middle" letter-spacing="-1">AEOrank</text>

  <!-- Tagline line 1 -->
  <text x="640" y="260" fill="#FAF9F7" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="600" text-anchor="middle">See how AI search engines</text>
  <text x="640" y="305" fill="#FAF9F7" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="600" text-anchor="middle">perceive your website</text>

  <!-- Command -->
  <rect x="340" y="345" width="600" height="52" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1.5"/>
  <text x="370" y="378" fill="#71717A" font-family="'JetBrains Mono', monospace" font-size="18">$</text>
  <text x="395" y="378" fill="#E8590C" font-family="'JetBrains Mono', monospace" font-size="18">npx aeorank-cli scan</text>
  <text x="675" y="378" fill="#A1A1AA" font-family="'JetBrains Mono', monospace" font-size="18">https://your-site.com</text>

  <!-- Feature pills row -->
  <rect x="255" y="430" width="130" height="36" rx="18" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="320" y="454" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="middle">12 Dimensions</text>

  <rect x="400" y="430" width="120" height="36" rx="18" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="460" y="454" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="middle">13 Plugins</text>

  <rect x="535" y="430" width="100" height="36" rx="18" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="585" y="454" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="middle">8 Files</text>

  <rect x="650" y="430" width="140" height="36" rx="18" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="720" y="454" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="middle">GitHub Action</text>

  <rect x="805" y="430" width="120" height="36" rx="18" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="865" y="454" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="14" font-weight="500" text-anchor="middle">Dashboard</text>

  <!-- URL -->
  <text x="640" y="540" fill="#71717A" font-family="Inter, sans-serif" font-size="18" font-weight="400" text-anchor="middle">aeorank.dev</text>

  <!-- Open source badge -->
  <rect x="570" y="560" width="140" height="32" rx="16" fill="#E8590C" fill-opacity="0.15"/>
  <text x="640" y="582" fill="#E8590C" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Open Source · MIT</text>
</svg>
